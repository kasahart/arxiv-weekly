name: Weekly arXiv Update

on:
  schedule:
    # 毎週金曜日 12:00 UTC = 21:00 JST
    - cron: '0 12 * * 5'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run（取得のみ、コミットなし）'
        required: false
        default: 'false'

permissions:
  contents: write
  models: read

jobs:
  # ─── Step 1: arXiv 論文取得 ───────────────────────────────────────────────
  fetch:
    runs-on: ubuntu-latest
    outputs:
      paper_count: ${{ steps.fetch.outputs.paper_count }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch papers from arXiv
        id: fetch
        run: |
          python scripts/fetch_papers.py
          COUNT=$(python -c "import json; print(len(json.load(open('data/raw_papers.json'))))")
          echo "paper_count=$COUNT" >> $GITHUB_OUTPUT
          echo "✅ Fetched $COUNT papers"

      - name: Upload raw papers
        uses: actions/upload-artifact@v4
        with:
          name: raw-papers
          path: data/raw_papers.json
          retention-days: 1

  # ─── Step 2: Claude による解析 ───────────────────────────────────────────
  analyze:
    needs: fetch
    runs-on: ubuntu-latest
    if: needs.fetch.outputs.paper_count > 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download raw papers
        uses: actions/download-artifact@v4
        with:
          name: raw-papers
          path: data/

      - name: Analyze papers with GitHub Models (Claude)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/analyze_papers.py

      - name: Upload analyzed papers
        uses: actions/upload-artifact@v4
        with:
          name: analyzed-papers
          path: data/analyzed_papers.json
          retention-days: 1

  # ─── Step 3: データ生成・Git コミット ────────────────────────────────────
  build:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Download analyzed papers
        uses: actions/download-artifact@v4
        with:
          name: analyzed-papers
          path: data/

      - name: Build weekly JSON and update index
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_data.py

      - name: Commit and push data files
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            DATE=$(date -u +"%Y-%m%d")
            git commit -m "chore: weekly update ${DATE}"
            git push
          fi

  # ─── Step 4: フロントエンドビルド・GitHub Pages デプロイ ─────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # build が push した最新を取得

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Copy data to web/public
        run: |
          mkdir -p web/public/data/weekly
          find data/weekly -name '*.json' -exec cp {} web/public/data/weekly/ \;
          cp data/index.json web/public/data/
          cp data/latest.json web/public/data/

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: web/dist
          publish_branch: gh-pages
          commit_message: "deploy: weekly update"
